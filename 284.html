            margin: 0
        }

            width: 100%;
            height: 100%;
            position: relative
        }

            width: 100%;
            height: 100%;

        }

            left: 0;

            max-height: 80%
        }

            height: 24px;
            margin: 10px 20px 20px 10px;
            text-align: left;
            border: 1px solid white;
            padding: 2px
        }

        #unity-progress-bar-full {
            width: 0;
            height: 100%;
            background: white
        }

        .light #unity-progress-bar-empty {
            border-color: black
        }

        .light #unity-progress-bar-full {
            background: black
        }

        .spinner,
        .spinner:after {
            border-radius: 50%;

            height: 5em
        }

            border-left: 1.1em solid #ffffff;

        }

        @keyframes spinner-spin {
            0% {
                transform: rotate(0deg)
            }

            100% {
                transform: rotate(360deg)
            }
