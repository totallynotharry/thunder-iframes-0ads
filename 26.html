		transform: skewX(10deg);
	}
}

@keyframes jump {
	0% {
		transform: translateY(0);
	}

	100% {
		transform: translateY(-10px);
	}
}

@keyframes rotate {
	0% {
		transform: rotate(-4deg);
	}

	100% {
		transform: rotate(4deg);
	}
}

@keyframes rotator {
	from {
		transform: translate(-50%, -50%) rotate(0deg);
	}

	to {
		transform: translate(-50%, -50%) rotate(360deg);
	}
}

@keyframes rotatorNo50 {
	from {
		transform: rotate(0deg);
	}

	to {
		transform: rotate(360deg);
	}
}

@keyframes scaleDown {
	0% {
		transform: scale(1);
	}

	100% {
		transform: scale(0.9);
	}
}

@keyframes scaleDown50 {
	0% {
		transform: translate(-50%) scale(1);
	}

	50% {
		transform: translate(-50%) scale(0.8);
	}

	100% {
		transform: translate(-50%) scale(1);
	}
}

.pulse {
	animation: pulse 1s ease 0s alternate infinite both;
}

.pulse2 {
	animation: scaleDown 1s ease 0s alternate infinite both;
}

.rotator {
	animation: rotatorNo50 8s linear 0s infinite both;
}

/*speaker********************/

.speaker {
	height: 30px;
	width: 30px;
	position: relative;
	overflow: hidden;
	display: inline-block;
}
.speaker span {
	display: block;
	width: 8px;
	height: 8px;
	background: #636363;
	margin: 11px 0 0 2px;
}
.speaker span:after {
	content: "";
	position: absolute;
	width: 0;
	height: 0;
	border-style: solid;
	border-color: transparent #5d5d5d transparent transparent;
	border-width: 10px 14px 10px 15px;
	left: -13px;
	top: 5px;
}
.speaker span:before {
	transform: rotate(45deg);
	border-radius: 0 50px 0 0;
	content: "";
	position: absolute;
	width: 5px;
	height: 5px;
	border-style: double;
	border-color: #5d5d5d;
	border-width: 7px 7px 0 0;
	left: 18px;
	top: 9px;
	transition: all 0.2s ease-out;
}
.speaker:hover span:before {
	transform: scale(0.8) translate(-3px, 0) rotate(42deg);
}
.speaker.mute span:before {
	transform: scale(0.5) translate(-15px, 0) rotate(36deg);
	opacity: 0;
}

@keyframes gear-anim {
    0%   {transform:rotate(0);}
    100%   {transform:rotate(360deg);}
}

#pf-logo-gear{
    max-width: 20%;
    max-height: 20%;

    display: block;
    position: absolute;
    left: 0;
    bottom: 0;
}
@keyframes alpha {
    0% {
        opacity: 1;
    }

    100% {
        opacity: 0;
    }
}

.rail-hand{
    position: absolute;
    width:120px;
    height:120px;

    animation-name: pulse;
    animation-duration: 0.5s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
}

.rail-hand img{
    transform: rotate(-10deg);
    max-width: 100%;
    max-height: 100%;
}

.low-fuel{
    position: absolute;
    transform-origin: top left;

    animation-name: alpha;
    animation-duration: 0.5s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
}


.info-text{
    position: absolute;
    text-align: center;
    font-size: 40px;
    font-family: ui-font;
    width:100%;

    color: #d1445e;

    animation-name: pulse;
    animation-duration: 0.15s;
    animation-iteration-count: infinite;
    animation-direction: alternate;

}

.circle-bar{
    position: absolute;
    left: 100px;
    top: 100px;
    background: #ffffff;
    width: 150px;
    height: 150px;
    z-index: 990;
}

.rail-hand, .text-box{
    /*transition:  left 0.5s, top 0.5s;*/
}
