EMBEDDED_FILES["local/10_az.json"] = `• Azazel, the Curious Angel •\n• Helltaker •\nPancakes.\nHow long have I been here?\nA few weeks.\nIt feels like forever.\nThe things I've seen...\nThe things I've done...\nI could write a spectacular paper on this, but nobody would believe me. It's just too surreal.\nOh...\nAnd my research has barely scratched the surface. Want to join me in my studies today?\nYou study too much. Eat your pancakes.`;
EMBEDDED_FILES["local/10_pm.json"] = `• Pandemonica, the Tired Demon •\n• Pandemonica, the Sadistic Demon •\n• Helltaker •\nPancakes and coffee.\n...\nAh! The "Tired Demon" no longer.\nIs it over-extracted again?\nOh no... It's quite alright actually. You even filtered it properely this time.\nKeep it up and you might still survive the day with no fingers broken.\nYeah...\nBut do feel free to mess it up. The local hospital proved quite competent so far.\nNext one at 5:15pm, double espresso, yes?\nIt's your job to remember. Not mine.\n\n\n\n`;
EMBEDDED_FILES["local/6.json"] = `• Azazel, the Curious Angel •\nOh my heavens! What would a living human be doing in hell? Most unusual.\nLooking for demons.\nLooking for angels.\nYou won't find many here. Lucky for you, I know a better place.\nPlease, hold my hand.\nWho would've guessed that lying will get you into heaven.\nSay goodbye to your demon harem, though.\nOh, you too? Let me guess, thesis on Modern Sin? Or is it Demonology? We should join forces.`;
EMBEDDED_FILES["local/m.json"] = `English version of Helltaker\n\n• RESTART [R or RB] •\n• LIFE ADVICE [L or LB] •\n• PAUSE MENU •\nMUSIC\nSOUND\nMAIN MENU\nRESUME\nSKIP PUZZLE\n\n\n-\nTHERE IS NO ESCAPE!\nMute\nLow\nMedium\nHigh\nI. Chains of Superbia\nII. Chains of Avaritia\nIII. Chains of Luxuria\nIV. Chains of Despair\n\nGame by\nŁukasz Piskorz (twitter.com/vanripperart)\nSound Design by\nPatryk Karwat (pkaudio.info)\nMusic Tracks\nApropos, Vitality, Epitomize and Luminescent\nfrom Mittsies (youtube.com/mittsies)\nThanks for playing!\n\n• Ancient Inscription •\nPiece of a ritual. Forbidden lore, undoubtedly.\nhttps://vanripper.itch.io/artbook`;
EMBEDDED_FILES["local/7.json"] = `• Justice, the Awesome Demon •\nYo, did you just solve that puzzle? That's awesome!\nIt took some work. Wanna join my harem?\nI just skipped it in the menu. Wanna join my harem?\nYou don't have to ask me. I'd never miss a party.\nThat totally sounds like something I would've done.\nSure, let's go. The more the merrier, right?`;
EMBEDDED_FILES["local/10_ma.json"] = `• Malina, the Sour Demon •\n• Helltaker •\nPancakes.\nDo you know how hard it is to find new turn based strategies we could play?\nAlmost everything mankind produced is either a half-assed sequel or a shitty ripoff.\nI would like to play them anyway.\nSame here, unfortunately.\nWe will need a lot of alcohol.`;
EMBEDDED_FILES["local/m1.json"] = `• Beelzebub, The Great Fly •\nGreetings little one. Please don't mind me.\nIt is just I, good old Beelzebub.\n\nNEW GAME\nCHAPTER SELECT\nEXIT\n\nStory of the Helltaker again? Interesting...\nDo you, by any chance, need a narrator?\nWhy please, allow me. It will be a pleasure.\nYou woke up one day with a dream.\nHarem full of demon girls.\nIt was, however, not an easy dream to achieve.\nIt could cost you your life.\n"When demon girls are involved, no price is high enough."\nYou said, as you ventured down to hell.\n\nI've tried many times. Haven't found much success so far.\nYou find yourself surrounded by the void.\nPress [ENTER or A] to continue.\n\nIs there anything else you desire?`;
EMBEDDED_FILES["local/9_1.json"] = `• Judgement, the High Prosecutor •\n• Pandemonica, the Tired Demon •\n• Cerberus, the Triple Demon •\n• Lucifer, the CEO of Hell •\nHOW DO YOU LIKE THE SIN MACHINE, TRESPASSER?\nSURRENDER AND LET IT CONSUME YOU!\nNo, wait! Don't give up! You need to get us out of here!\nAnd I'm still looking forward to my coffee.\nLEAVE HOPE! HIS FATE IS SEALED!\nJudgement, dear. This man may not know it, but he belongs to me. Could you please not damage him?\nBE SILENT! REAL WORK IS ABOUT TO BEGIN!\n`;
EMBEDDED_FILES["local/10.json"] = `Thus, your journey has come to an end.\nYou have successfully took girls from hell.\nAnd was henceforth known as the Helltaker.\nIt was, however, not an easy life to live.\nIt was sure to be short and full of suffering.\nBut life is full of suffering no matter how you live it.\nSo you might as well have some fun when you're at it.`;
EMBEDDED_FILES["local/10_ed.json"] = `• Police •\n• Helltaker •\nPolice! Open the door.\nOpen. (end of the game)\nDon't open.\nWe know you're in there! Open the door NOW!\nPancakes?\nOh, thanks. We still have questions though.\n...\nAnd that was the story of the Helltaker.\nNarrated for you by good old Beelzebub.\nQuite a silly tale, I know.\nTo be honest... downright abhorrent, actually.\nHorrible story about horrible people.\nBut perhaps... you found some joy in it.\nMaybe a laugh or two?\nStill... thank you for keeping this old fly some company.\nUntil next.\nTHE END`;
EMBEDDED_FILES["local/10_lu.json"] = `• Lucifer, the CEO of Hell •\n• Helltaker •\nAnother batch of pancakes done, I see.\nAnd it's soooooo good...\nThanks for the help.\nDon't mention it. It's the least I can do.\nThough I have to say, I still can't figure out how you get them perfectly thin every time.\nAnd the way you spin them in the air. There must be some sorcery involved.\nExperience.\nYeah sure. Better go give everyone their pancakes.`;
EMBEDDED_FILES["local/10_ce.json"] = `• Cerberus, the Triple Demon •\n• Helltaker •\nPancakes.\nWe messed up.\nHarrasing neighbors again? What did you do? \n...\nWhy is there police at the door?`;
EMBEDDED_FILES["local/10_ju.json"] = `• Justice, the Awesome Demon •\n• Helltaker •\nPancakes.\nAwesome. I have a question though.\nShoot.\nThe girls say you never take off your shades. Why is that?\nI could ask you the same.\nOh, me? It's 'cause I'm blind.\nThat's my story. Care to share yours?\nMaybe one day...\nOh, come on. The girls are already taking bets.\nI'm losing 10 bucks if you don't have laser vision.\n\n\n`;
EMBEDDED_FILES["local/1.json"] = `• Pandemonica, the Tired Demon •\nName's Pandemonica, Hell's Customer Service.\nHow may I serve you?\nWe can figure something out at my place.\nMaybe I can serve YOU instead?\nYou thought you're leaving hell alive? How delusional.\nShe took your face in her hands and snapped your neck with professional gentleness.\nSweet of you to offer. I could really use some coffee.\nI'm not myself without it.`;
EMBEDDED_FILES["local/9h.json"] = `• Lucifer, the CEO of Hell •\n• Justice, the Awesome Demon •\nIf you can't do it, just skip it in the pause menu. I don't want to be sitting here all day.\nJust look at all this mess. It seems nobody used the hell's gate in quite some time...\nMakes me wonder how you got here in the first place.\nIt looks like he can do miracles. He somehow got you out of your office after all.\nTrue. He's the first one to not take the slave offer.\nFor a second there, I hoped he would give YOU a slave offer.\nJustice... Don't give people ideas that will get them murdered.\nOh, come on. I'm sure you'd enjoy some maid roleplay.`;
EMBEDDED_FILES["local/10_zd.json"] = `• Zdrada, the Bitch Demon •\n• Helltaker •\nPancakes.\nSure. But I could use some fire.\nNo smoking in the house.\nOr what? You'll punish me? Go ahead, I've been a very bad girl.\nYou'd enjoy that, wouldn't you?\nGo screw yourself.`;
EMBEDDED_FILES["local/11.json"] = `• Lucifer, the CEO of Hell •\n• Justice, the Awesome Demon •\n• Beelzebub, The Great Fly •\n• Helltaker •\nWhat is this? Did someone opened a portal at last?\nGreetings little one. I am Beelzebub.\nAnd you must be the chosen one. The King of Hell.\nThat means... I am nothing, but your humble servant.\nEnter this gateway and take your rightful throne.\nHey. Is this a one-way banishment portal?\nFuck.\nBeel! And here I hoped I'd never see your face again.\nFeeling's mutual, my dear Lucy.\nOld friend of yours?\nDon't believe a single word from Beelzebub The Exiled.\nMost dangerous kind of demon. Forever sealed inside the Abyss.\nAsk Justice. She was the High Prosecutor back then.\nIt was awesome. Wish you've seen that epic battle.\nIf you step through the portal, your soul will get imprisoned too. Only madness waits for you there.\nI've been here for quite some time and found no madness yet. Quite disappointing really.\nA bit of mad would be refreshing. All you can find here is darkness and loneliness.\nJust ignore this pest. I'll close the portal after dinner.\nI'll get out one day.\nWe'll be ready.`;
EMBEDDED_FILES["local/2.json"] = `• Modeus, the Lustful Demon •\nYou and me. Now.\nDeal. No questions asked.\nNo time. Busy gathering girls.\nThey always say that... and they always try to run away.\nI'll have to break your knees, just in case.\nShe pulled out a sledgehammer. It was not going to be pretty.\nDemon harem? You poor fool... They will rip you to shreds, and I HAVE to see this.`;
EMBEDDED_FILES["local/5h.json"] = `• Malina, the Sour Demon •\n• Cerberus, the Triple Demon •\nWhat? Never played rhythm based dungeon crawlers, have you?\nIf the rhythm of the spikes is not to your liking, just kick some rocks around until it does.\nThis place stinks of smoke. Zdrada must be close by.\nOh no... Please no...`;
EMBEDDED_FILES["local/9_4.json"] = `• Judgement, the High Prosecutor •\nANY LAST WORDS BEFORE THE REAL PAIN BEGINS?\nOnly thing I regret is not seeking you sooner.\nBeing punished by you makes all sins worth it.\nQUIT YOUR CHEAP FLATTERIES! YOU MAKE MY JOB DIFFICULT!\nBut damn, you have amazing eyes.\nDid I mention how much I love your hair?\nLook. I don't really want to do this. But the pacts been sealed. Nothing will prevent your damnation.\nHowever... I could postpone your torment a few years, if you leave and never disturb hell again.\nOur fates are one. I will kill you and you'll suffer. But it does not have to be today...\nSO CONSIDER YOURSELF LUCKY AND GET OUT OF MY SIGHT!\n...\n... ...\n... ... ...\nI SAID YOU ARE FREE TO GO! BEGONE!\nWHAT? YOU WANT TO INVITE ME TO YOUR HAREM? DON'T BE RIDICULOUS!\nYou'd share roof with an immortal avatar of pain, blood-sworn to murder you through torture?\nWouldn't want it any other way.\nBelieve me, I have worse in my harem already.\nWait. You are serious?\nSeeing how far off proper ritual we are already, I might as well give it a shot.`;
EMBEDDED_FILES["local/7h.json"] = `• Azazel, the Curious Angel •\n• Modeus, the Lustful Demon •\nThis one looks tricky. Might require some testing to find the perfect order of moves.\nPlease, take your time. Miss Modeus here is sharing with me her considerably warped view on love.\n...things can get violent, so moderation is important. People die if you love them too much.\nHow fascinating. Please expand on that. I want to know all the details.`;
EMBEDDED_FILES["local/3h.json"] = `• Modeus, the Lustful Demon •\n• Pandemonica, the Tired Demon •\nAdvice? Easy. Skip all the puzzles, gather all the bitches and let's engage in proper harem activities.\nPlease, forgive Modeus. Most demons are like her. Lust for sin is in our blood, hard to keep it in check.\nAs for the puzzle... Try to not spend too much time kicking around those undead slaves and you should be fine.\n\n\n`;
EMBEDDED_FILES["local/1h.json"] = `• Beelzebub, The Great Fly •\nYou want advice, but you have nobody to ask.\nYou haven't found any cute demons yet.\nAnd no matter how cute I might be, I'm but a narrator.\nGo find some harem worthy maidens so you can pester them for advice to your heart's content.`;
EMBEDDED_FILES["local/11_1.json"] = `• Beelzebub, The Great Fly •\nYou find yourself surrounded by the void.\nShades of darkness you never knew existed.\nYou feel them rather than see them. Sight is no longer a concept.\nThen, you are suddenly sick. With every illness known to man.\nBut you are not dying. Death is no longer a concept either.\nYou hear the buzzing. Thousands of flies swarm around you.\nThen, a cloying wave hits you. The sweet smell is overwhelming. Unbearable...\nYet over the years to come, you'll learn to love it.\nWhat is it now...\nWait, what...?\nYou? How did you...\n...\nI simply can't believe you just did that.\nHave you really bought that King of Hell crap? No, that simply can't be it. So why...\nWait. I don't think I really want to know.\nSince we find ourselves stuck here for the foreseeable future...\nI think a proper introduction should be made?\nI have many names. The Sovereign of Pestilence, The Warden of Decay, The Mistress of the Flies, The...\nWait, where are my manners? I have a guest. I should make myself more presentable.\nHere. I think you will find this form a little more comfortable to converse with.\nWhere was I? Ah yes...\n...also known as The Mistress of the Flies and The Queen Crimson. Pleased to meet your acquaintance.\nWelcome to the Abyss. Make yourself at home.\nHere's an idea! I'll show you around my castle. I think you'll love what I did with the place.\nWhy yes, I've built it myself. You'd be surprised what kind of stuff can be made from the very fabric of darkness.\nAbyssal exile makes you seek the weirdest hobbies.\nHey, I just noticed.\nYou brought something with you. If I knew you could do that, I'd ask for some sweets. Demons love sugar.\nChocolate pancakes.\nChocolate pancakes.\n...\nThis is the best day of my life.\n...\nAnd that was the story of the Helltaker.\nNarrated for you by good old Beelzebub.\nPlease, forgive this little... self-insert at the end.\nI know, I know... It was not supposed to be a story about me. But I just couldn't help myself.\nYou may have questions, I assume. Had this really happened? Where is the Helltaker now?\nMaybe YOU are the Helltaker?\nYou just forgot after all those years in the Abyss.\nOr maybe YOU don't even exist?\nAnd I'm just a poor old fly talking to herself.\nHoho. For the sake of the story, some questions are better left unanswered.\nUntil next.\nTHE END`;
EMBEDDED_FILES["local/3.json"] = `• Cerberus, the Triple Demon •\nAre you a human? A real human? Please, take us with you.\nDeal. No questions asked.\nThis is getting too easy. I have questions.\nYes! At last! It's time to corrupt the mortal realm!\nWe need a human to cross the hell's gate. You don't have to be in one piece, though.\nThey jumped you like rabid dogs. Canine sounds included. The cuteness of it all gave you a heart attack.`;
EMBEDDED_FILES["local/m2.json"] = `Chapter I - The Tired Demon\nChapter II - The Lustful Demon\nChapter III - The Triple Demon\nChapter IV - The Sour Demon\nChapter V - The Bitch Demon\nChapter VI - The Curious Angel\nChapter VII - The Awesome Demon\nChapter VIII - The CEO of Hell\nChapter IX - Judgement\nChapter X - Epilogue\n\n`;
EMBEDDED_FILES["local/8.json"] = `• Lucifer, the CEO of Hell •\nWe meet at last. You've proved yourself worthy by passing all my trials.\nPledge your soul to me and I'll make you my most treasured slave.\nYes my queen!\nNo, thanks. But you can join my harem.\nEager little soul...\nAs you knelt, she planted a kiss of your forehead, and your life melted away.\nWhat are you trying to accomplish? You think you can enslave demons to your will?\nCall me master. And ask for permission before you speak.\nI can offer coffee, turn based strategies and chocolate pancakes.\nI see I have to teach you your place.\nShe made a hand gesture, and all your blood turned into vinegar. It's hard to explain the feel.\nReally? Is that it? You come here, and try to buy me over with pancakes?\nYou're lucky I have a thing for pancakes.\nI think you've convinced me. That harem of yours may prove to be entertaining after all.`;
EMBEDDED_FILES["local/6h.json"] = `• Zdrada, the Bitch Demon •\n• Malina, the Sour Demon •\n• Pandemonica, the Tired Demon •\nDon't look at me for puzzle hints. I'm not a nerd.\nMaybe go kill yourself on some spikes. It'll be amusing.\nMy sister's always like that. I can't believe you invited her...\nYeah. What were you thinking, man?\nGlad you invited Malinka, though.\nShe spends too much time, all alone, playing the most nerdy video games I've ever seen.\nCan you please shut up?\nDo you know how turned on she gets while playing them?\nThat one time when she...\nKill one of us. Me or her. Please. Fast.\n*KILL THEM BOTH*\n*KILL YOURSELF*\nJust leave them be. You get used to it, eventually.\nWhat do you think you're doing? Hey! W-\nYou had enough. You decided to follow Zdrada's advice and killed yourself on the spikes.`;
EMBEDDED_FILES["local/9_2.json"] = `• Judgement, the High Prosecutor •\n• Lucifer, the CEO of Hell •\n• Justice, the Awesome Demon •\n• Azazel, the Curious Angel •\nTHOSE CHAINS THAT BIND YOU ARE MADE OF THINGS THAT BROUGHT YOU HERE.\nYOUR EGO. YOUR GREED. YOUR LUST. YOU ARE YOUR OWN TORTURER.\nEnough! High Prosecutor, I order you to stand down at once!\nNO AUTHORITY STANDS ABOVE PUNISHMENT!\nKeep going, Judgement! You are on the roll!\nYes, please continue. This is A+ material so far.\nI'm supposed to be the goddamn Queen of Hell! Why is nobody ever listening to me?`;
EMBEDDED_FILES["local/4.json"] = `• Malina, the Sour Demon •\nGreat, more braindead idiots... Never seen your ugly face before.\nWhat are you playing at?\nI'd sure love to play with you.\nThis is delicious. Please, insult me more.\nLike what... video games? Sure, why not. As long as you're okay with turn based strategies.\nFantastic. Just my luck to find another masochist creep.\nShe made a swiping motion and a fountain of blood exploded from your devastated throat.`;
EMBEDDED_FILES["local/10_xx.json"] = `• Judgement, the High Prosecutor •\n• Helltaker •\nPancakes.\nTRESPASSERS SEEK TO INVADE OUR DOMAIN! SHOULD I DISPOSE OF THEM?\nNo need. I'll take care of this.\nSure, have fun.`;
EMBEDDED_FILES["local/4h.json"] = `• Pandemonica, the Tired Demon •\n• Cerberus, the Triple Demon •\nYou don't look like you need help with this one.\nOr you just wanted to talk?\nHey, do you smell that? Orange, berries and... vodka?\nThere's no doubt. That's got to be Malina.\nShe acts hard to get, but maybe you'll figure her out.\nThen we will all hang out and it's gonna be FUN!`;
EMBEDDED_FILES["local/5.json"] = `• Zdrada, the Bitch Demon •\nYo. I've heard about your harem. I'm in.\nWait. I have a feeling I'll regret it.\nIt's not really a harem anymore. We just play turn based strategies.\nHoly shit. Let me put you out of your misery.\nYour vision swam. The last thing you noticed was a knife buried hilt deep between your ribs.\nToo bad, I'm coming anyway. Go ahead, try to stop me.`;
EMBEDDED_FILES["local/2h.json"] = `• Pandemonica, the Tired Demon •\nSince we travel together, I might as well do my job.\nYou've noticed how exploring hell takes a lot of will? In hell, if you run out on will - you die.\nWalking trough spikes takes twice the will.\nThe trick is to spend as little time on spikes as possible.\nThank you for relying on Hell's Customer Service.\nHow would you rate your overall satisfaction with provided help, on a scale from 1 to 10?\nThank you for your feedback. We are here to serve.\nWhoa... Never got a ten before...`;
EMBEDDED_FILES["local/9_3.json"] = `• Judgement, the High Prosecutor •\n• Modeus, the Lustful Demon •\n• Malina, the Sour Demon •\n• Zdrada, the Bitch Demon •\nYOU TRULY THINK YOU CAN BREAK FREE OF THOSE SHACKLES?\nYOU SHOULD KNOW... HOPE LEADS TO DISAPPOINTMENT, AND DISAPPOINTMENT TO DESPAIR.\nCHAINS OF DESPAIR ARE THE MOST DELIGHTFUL.\nYou must be cursed Malinka. You just found a fellow nerd and he's already done for.\nKnowing my luck, he played Necropolis anyway.\nI should've kept him for myself after all...\nYES! REGRET EVERYTHING YOU'VE EVER DONE!\nI love how you did your hair.\nThat outfit kills! Ten out of ten!\nLIEEEEEEEES! THEY WON'T SAVE YOU FROM YOUR FATE!\nI know. That's why I can be honest.\nI also really like the claws!\nIS THAT SO? IN THAT CASE, THANK YOU! I GUESS?\nNOW LET'S GET BACK TO SUFFERING!`;
EMBEDDED_FILES["local/10_mo.json"] = `• Modeus, the Lustful Demon •\n• Helltaker •\nPancakes.\n...\nYou're reading... romantic comedy?\nNever heard of this "romance" stuff before. It's the kinkiest thing I've ever seen.\nMaybe I've been doing things wrong all this time?\nWhat, wanna go on a date?\nI've always known you were a perverted degenerate.`;
EMBEDDED_FILES["local/9.json"] = `• ??? •\n• Judgement, the High Prosecutor •\nYOU TRULY THOUGHT YOU COULD JUST WALK AWAY?\nAFTER ALL YOU HAVE DONE?\nYou felt the biting cold of chains on your skin. Followed by fire, burning the flesh from your bones.\nIt felt as if you've died a thousand deaths. Yet as the flames subsided... Somehow, you were still alive.\nI ONLY JUST FOUND YOU, TRESPASSER!\nSO DON'T DIE ON ME YET.\nWE WILL SPEND A LOT OF TIME TOGETHER, YOU AND I.\nIGNITE THE SIN MACHINE! SUFFERING MUST BE MADE!`;
EMBEDDED_FILES["localHM/hm_5.json"] = `• Loremaster, the Science Demon •\n• Lucifer, the Maid Demon •\n• Subject 67 •\nWell, I'll be damned! You are pretty good for a non-66 number. This is A+ material so far.\nYou do realise I can always skip puzzles from the menu, right?\nIt almost feels like I'm young again. Naive angel student writing a thesis on modern sin.\nOf course, by now, I have completed exhaustive research on all the sins in recorded history. Ten times over.\nYet, at the sight of anything mildly suggestive, she's still sweating like a thirsty adolescent.\nLucy, please. I told you to ask for permission before you mock me.`;
EMBEDDED_FILES["localHM/hm_4.json"] = `• Loremaster, the Science Demon •\n• Subject 67 •\nI've committed countless atrocities, true. But it was all in the name of science.\nSo that all sin can be analysed, documented and archived... Maybe even cured one day...\nThat's what makes angels different from demons. Motivation behind actions.\nKeep talking to yourself, fiend. I'll have my hands around your neck soon enough.\nYou don't believe I'm an angel, do you?\nI'd show you my halo... If only I knew where have I put it.\nWait a moment... Didn't I-\nNo, no, no! That's impossible. I must have left it in my other coat.\nThe next test is particularly sadistic. Have fun.`;
EMBEDDED_FILES["localHM/hm_8.json"] = `• Lucifer, the Maid Demon •\n• Subject 67 •\n• ??? •\nThere you go.\nNow you look like a proper handsome demon.\nDo you find my humiliation amusing, wretched imp?\nOh, come now. It looks good on you. Honest.\nNot like you have much choice in how to dress. You're property of our little "angel" now.\nJust like all of hell, actually. It's a bloody disgrace.\nOne day I'll have my crown back. Mark my words.\nI wonder, though. When the time comes... Will you side with me, or will you side with her?\n...\nShe knows me well. But she does not know you.\nYou can be unpredictable, and therefore, useful.\nThink about what I said, okay?\nYou remind me of a man I once knew.\nI wonder how he's doing these days.\nTHE END`;
EMBEDDED_FILES["localHM/hm_3.json"] = `• Loremaster, the Science Demon •\n• Lucifer, the Maid Demon •\n• Subject 67 •\nStill alive, Subject not-66?\nI'm coming for you, and if you think your toys will stop me, you're severely mistaken!\nSure, whatever. Since your chances of survival are astronomically low, I might as well share with you a secret...\nYou see, I'm not a real demon. I'm actually an angel.\nMy research project required me to disguise as a demon and climb to the top of hell's hierarchy.\nYou'd be surprised how easy taking hell over turned out to be.\nThey've underestimated my curiosity. Isn't that right, Lucy?\n...`;
EMBEDDED_FILES["localHM/hm_2.json"] = `• Loremaster, the Science Demon •\n• Lucifer, the Maid Demon •\n• ??? •\nMortality rate of the next trial is quite brutal. But don't worry, I have high hopes for you.\nEnough of this! Release me or I'll show you how REAL suffering looks like!\nAccording to data, you are Subject 66 of the 6th experimental batch. That's very promising.\nTriple six. Yes. There is power in such numbers. If anyone can pass my examination, it's you.\nPermission to speak, Loremaster?\nYes, Lucy? What is it?\nSubject 66 died yesterday. This is Subject 67.\nWhy, thank you for ruining my hopes.`;
EMBEDDED_FILES["localHM/hm_1.json"] = `• Loremaster, the Science Demon •\n• Lucifer, the Maid Demon •\n• ??? •\nAnother one's awake! And such a handsome specimen at that.\nAre you the one who did this to me? Explain yourself at once!\nI'm trying to create a perfect fusion between human and demon.\nLet's put that delicious body through the next trial, shall we?\nBegin phase 2, Lucy.\nAs you wish, Loremaster.`;
EMBEDDED_FILES["localHM/hm_0.json"] = `Would you prefer to start from the beginning?\nOr shall I proceed to the later stages of the story?\nIt starts like most tales do.\nThe protagonist wakes up one day with a dream.\nBut it is a feverish nightmare.\nHis body and mind are no longer his own.`;
EMBEDDED_FILES["localHM/hm_7.json"] = `• Loremaster, the Science Demon •\n• Lucifer, the Maid Demon •\n• Justice, the Apple Pie Demon •\n• Subject 67 •\nYou passed.\nWe've finally done it.\nWe've successfully committed sin against creation itself.\nFantastic. Now move to the part where you surrender the apple pies, will you?\nThose apple pies I promised you? We got a bit too excited and already ate them.\nAnd when I say "we", I mean Lucy.\n...\nYou'll have to wait until our chief apple pie scientist makes more.\nApple pie's ready!\nSpeak of the devil. Justice is a blessing that keeps on giving.\nI couldn't say it better.\nOh shucks, you guys.\nI hope you choke on them, you crazy witches!\nHere's your apple pie. You deserved it.\nLucy, be a dear and fetch us some coffee too.\nSubject 67, you are the first healthy and stable example of a new species of demon.\nYou have no idea how much we can learn from you.\nAnd I want to learn EVERYTHING.`;

<body>
<div id="unity-container">
<canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
<div id="unity-loading-bar">
<div id="unity-logo"></div>
<div id="unity-progress-bar-empty">
<div id="unity-progress-bar-full"></div>
</div>
</div>
<div id="unity-warning"> </div>
</div>
<script>
const base = "https://cdn.jsdelivr.net/gh/wasm-rip/HellTaker-Web@main/helltakerweb/Build/";
async function mergeChunks(name, parts) {
const buffers = [];
for (let i = 1; i <= parts; i++) {
const res = await fetch(`${base}${name}.part${i}`);
buffers.push(await res.arrayBuffer());
}
return URL.createObjectURL(new Blob(buffers, { type: 'application/octet-stream' }));
}
var container = document.querySelector("#unity-container");
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var warningBanner = document.querySelector("#unity-warning");
function unityShowBanner(msg, type) {
function updateBannerVisibility() {
warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
}
var div = document.createElement('div');
div.innerHTML = msg;
warningBanner.appendChild(div);
if (type == 'error') div.style = 'background: red; padding: 10px;';
else {
if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
setTimeout(function() {
warningBanner.removeChild(div);
updateBannerVisibility();
}, 5000);
}
updateBannerVisibility();
}
var script = document.createElement("script");
script.src = base + "webgl.loader.js";
script.onload = async () => {
const dataBlob = await mergeChunks("webgl.data", 3);
const wasmBlob = await mergeChunks("webgl.wasm", 3);
var config = {
dataUrl: dataBlob,
frameworkUrl: base + "webgl.framework.js",
codeUrl: wasmBlob,
streamingAssetsUrl: "StreamingAssets",
companyName: "vanripper",
productName: "Helltaker",
productVersion: "ex1.1",
showBanner: unityShowBanner,
};
createUnityInstance(canvas, config, (progress) => {
progressBarFull.style.width = 100 * progress + "%";
}).then((unityInstance) => {
loadingBar.style.display = "none";
}).catch((message) => {
alert(message);
});
};
document.body.appendChild(script);
</script>
</body>
