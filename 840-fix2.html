    <style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100%;

    #loading-text {
  font-weight: bold;

    270deg,

  );
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbow 3s ease infinite;
}

@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }

}

  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
  function resizeUnityCanvas() {
    const canvas = document.getElementById('unity-canvas');
    if (!canvas) return;

    const targetAspect = 10 / 16;

    const reducedHeight = window.innerHeight;
    const calculatedWidth = reducedHeight * targetAspect;

    canvas.style.height = reducedHeight + 'px';
    canvas.style.width = calculatedWidth + 'px';

    canvas.style.display = 'block';
    canvas.style.margin = 'auto';
    canvas.height = ""+reducedHeight+"";
    canvas.width = ""+calculatedWidth+"";

  }
      setInterval(() => {
        resizeUnityCanvas();
      }, 500);
      window.addEventListener('resize', resizeUnityCanvas);
      window.addEventListener('orientationchange', resizeUnityCanvas);
  window.addEventListener('load', resizeUnityCanvas);

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/TalkingHippo.loader.js";

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      async function fetchWithProgress(url, onProgress) {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Fetch failed: ' + url + ' (' + response.status + ')');
        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength, 10) : 0;
        const reader = response.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          if (total > 0 && onProgress) onProgress(loaded / total);
        }
        const combined = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
          combined.set(chunk, offset);
          offset += chunk.length;
        }
        return combined.buffer;
      }

      async function decompressZip(zipBuffer, mimeType) {
        const zip = await JSZip.loadAsync(zipBuffer);
        const entry = Object.values(zip.files).find(f => !f.dir);
        if (!entry) throw new Error('Empty zip file');
        const arrayBuffer = await entry.async('arraybuffer');
        return URL.createObjectURL(new Blob([arrayBuffer], { type: mimeType }));
      }

      async function fetchAndDecompress(zipUrl, mimeType, slot, onProgress) {
        const buffer = await fetchWithProgress(zipUrl, (p) => {
          slot.progress = p;
          onProgress();
        });
        slot.progress = 1;
        onProgress();
        return decompressZip(buffer, mimeType);
      }

      const zipFiles = [
        { url: buildUrl + "/TalkingHippo.data.zip",        mime: 'application/octet-stream' },
        { url: buildUrl + "/TalkingHippo.wasm.zip",         mime: 'application/wasm' },
        { url: buildUrl + "/TalkingHippo.framework.js.zip", mime: 'text/javascript' },
      ];

      (async () => {
        try {
          const slots = zipFiles.map(() => ({ progress: 0 }));

          function onProgress() {
            const avg = slots.reduce((sum, s) => sum + s.progress, 0) / slots.length;
            progressBarFull.style.width = (avg * 100) + '%';
          }

          const blobUrls = await Promise.all(
            zipFiles.map((f, i) => fetchAndDecompress(f.url, f.mime, slots[i], onProgress))
          );

          const [dataBlobUrl, wasmBlobUrl, frameworkBlobUrl] = blobUrls;

          var script = document.createElement("script");
          script.src = loaderUrl;
          script.onload = () => {
            createUnityInstance(canvas, {
              arguments: [],
              dataUrl: dataBlobUrl,
              frameworkUrl: frameworkBlobUrl,
              codeUrl: wasmBlobUrl,
              streamingAssetsUrl: "StreamingAssets",
              companyName: "DefaultCompany",
              productName: "Talking Hippo",
              productVersion: "1.0",
              showBanner: unityShowBanner,
            }, (progress) => {
              progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
              loadingBar.style.display = "none";
              blobUrls.forEach(url => URL.revokeObjectURL(url));
              resizeUnityCanvas();
            }).catch((message) => {
              alert(message);
            });
          };
          document.body.appendChild(script);

        } catch (err) {
          alert('Failed to load game: ' + err.message);
        }
      })();
    </script>
  </body>
